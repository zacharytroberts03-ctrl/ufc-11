# Daily card refresh — runs in GitHub's cloud so it does not depend on the
# user's PC being awake. Replaced the Windows `CardDealsUpdater` scheduled task
# on 2026-05-11 after the local pipeline silently missed a Friday refresh while
# the laptop was asleep/hibernated and then a Sunday catch-up hung mid-run.
#
# Schedule is in UTC. Local target times (CDT = UTC-5, CST = UTC-6 in winter):
#   Mon 14:00 UTC  -> 09:00 CDT / 08:00 CST  (the Mon 9 AM local slot)
#   Wed 19:00 UTC  -> 14:00 CDT / 13:00 CST  (the Wed 2 PM local slot)
#   Sat 01:00 UTC  -> Fri 20:00 CDT / 19:00 CST (the Fri 8 PM local slot)
#
# All work — scrape, agent pipeline, publish, git push, vercel deploy — happens
# inside `backend/scripts/refresh_cache.py`. This workflow is the cron trigger
# plus the environment (Python, Node, secrets, write perms on the repo).

name: Refresh UFC card

on:
  schedule:
    - cron: "0 14 * * 1"
    - cron: "0 19 * * 3"
    - cron: "0 1 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-card
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # Restore the per-(fighter,agent,opponent,last_fight_date) cache between
      # runs so repeat refreshes of the same upcoming card hit cache instead of
      # re-paying ~$30-50/run in Anthropic calls. First run is a cache miss and
      # populates this; subsequent runs of the same event are then nearly free.
      - name: Restore agent cache
        uses: actions/cache@v4
        with:
          path: backend/cache/agent_reports.json
          key: agent-reports-${{ github.run_id }}
          restore-keys: |
            agent-reports-

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Refresh card and deploy
        working-directory: backend
        run: python scripts/refresh_cache.py

      - name: Email status notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: FightZ Bot <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          subject: "[FightZ refresh] ${{ job.status }} — run #${{ github.run_number }}"
          body: |
            FightZ refresh-card workflow finished.

            Status:       ${{ job.status }}
            Workflow:     ${{ github.workflow }}
            Triggered by: ${{ github.event_name }}
            Run number:   #${{ github.run_number }}
            Commit:       ${{ github.sha }}

            Site:         https://fightz.app/
            Run log:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            If status is "failure" or "cancelled", open the run log above to see which step broke.
