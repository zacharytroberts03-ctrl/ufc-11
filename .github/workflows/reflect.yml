# Post-event reflection. Runs every Sunday at 12:00 UTC. Idempotent: if no
# UFC event completed in the past 7 days that we have predictions for, the
# script exits 0 immediately.
#
# Pipeline (in backend/reflection/__main__.py):
#   detect -> scrape outcomes + closing lines -> deterministic score
#   -> 3 Opus passes (per-fight, card meta, lesson merge)
#   -> commit lessons.json/lessons.md/scores/<event>.json/metrics_log.jsonl
#
# See docs/superpowers/specs/2026-05-11-post-event-reflection-design.md.

name: Reflect on completed UFC card

on:
  schedule:
    - cron: "0 12 * * 0"   # Every Sunday 12:00 UTC (~7 AM CDT)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes/commits)?"
        required: false
        default: "false"
      event_key:
        description: "Force reflection on a specific event_key (e.g. ufc-328--chimaev-vs--strickland__May 09, 2026)"
        required: false

permissions:
  contents: write

concurrency:
  group: reflect-card
  cancel-in-progress: false

jobs:
  reflect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Run reflection
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.event_key }}" ]; then
            ARGS="$ARGS --event-key \"${{ github.event.inputs.event_key }}\""
          fi
          eval "python -m backend.reflection $ARGS"

      - name: Email status notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: FightZ Bot <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          subject: "[FightZ reflect] ${{ job.status }} — run #${{ github.run_number }}"
          body: |
            FightZ reflection workflow finished.

            Status:       ${{ job.status }}
            Workflow:     ${{ github.workflow }}
            Triggered by: ${{ github.event_name }}
            Run number:   #${{ github.run_number }}
            Commit:       ${{ github.sha }}

            Lessons:      ${{ github.server_url }}/${{ github.repository }}/blob/master/backend/cache/lessons.md
            Run log:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            If status is "failure" or "cancelled", open the run log above to see which step broke.
            If status is "success" but you don't see updated lessons, the workflow likely found no completed events to reflect on (idempotent skip).
